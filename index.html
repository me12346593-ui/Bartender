<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bar SOP Trainer V3.0 (Strict Mode)</title>
    <style>
        :root { --bg-color: #2c3e50; --text-color: #ecf0f1; --accent: #e74c3c; --success: #27ae60; --gold: #f1c40f; }
        body { font-family: 'Courier New', monospace; background: var(--bg-color); color: var(--text-color); display: flex; flex-direction: column; align-items: center; height: 100vh; margin: 0; user-select: none; overflow: hidden; }
        
        /* HUD */
        #hud { width: 95%; display: flex; justify-content: space-between; padding: 10px; background: #34495e; border-bottom: 2px solid #7f8c8d; box-sizing: border-box; }
        .stat { font-size: 14px; font-weight: bold; }
        
        /* Main Area */
        #game-area { display: flex; width: 100%; height: 100%; overflow: hidden; }
        
        /* Left: Orders */
        #order-panel { width: 30%; border-right: 2px solid #7f8c8d; padding: 10px; overflow-y: auto; background: #2c2c2c; box-sizing: border-box;}
        .order-card { background: #fff; color: #000; padding: 10px; margin-bottom: 10px; border-radius: 4px; position: relative; animation: slideIn 0.3s; }
        @keyframes slideIn { from { transform: translateX(-100%); } to { transform: translateX(0); } }
        .order-timer { height: 5px; background: var(--success); width: 100%; transition: width 1s linear; }
        
        /* Right: Workstation */
        #workstation { width: 70%; padding: 10px; display: flex; flex-direction: column; box-sizing: border-box; }
        
        /* Glass Display */
        #mixing-glass { height: 60px; border: 2px solid #fff; margin-bottom: 10px; padding: 10px; display: flex; align-items: center; gap: 5px; background: rgba(0,0,0,0.2); overflow-x: auto;}
        .ingredient-tag { background: #3498db; padding: 5px 10px; border-radius: 15px; font-size: 12px; white-space: nowrap; animation: popIn 0.2s; }
        @keyframes popIn { from { transform: scale(0); } to { transform: scale(1); } }
        
        /* Controls */
        .controls-section { margin-bottom: 10px; flex: 1; overflow-y: auto; }
        .section-title { font-size: 12px; color: #95a5a6; margin-bottom: 5px; border-bottom: 1px solid #555; }
        .btn-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
        button { padding: 10px; background: #bdc3c7; border: none; cursor: pointer; font-family: inherit; font-weight: bold; color: #2c3e50; border-radius: 3px; font-size: 12px; }
        button:active { transform: scale(0.95); }
        button.spirit { background: #e67e22; color: #fff; } /* Base Spirits */
        button.mixer { background: #3498db; color: #fff; } /* Mixers */
        button.garnish { background: #2ecc71; color: #fff; } /* Garnish */
        button.snack { background: #9b59b6; color: #fff; } /* Snacks */
        button.action { background: var(--gold); width: 100%; margin-top: 5px; font-size: 18px; padding: 15px; }

        /* Popups */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        #recipe-book { position: absolute; top: 50px; right: 10px; background: #fff; color: #000; padding: 20px; display: none; border: 3px solid #f1c40f; z-index: 50; max-height: 80vh; overflow-y: auto; width: 300px; }
        
        .snack-progress { height: 5px; background: #9b59b6; width: 0%; transition: width 0.1s linear; position: absolute; bottom: 0; left: 0; }
    </style>
</head>
<body>

    <div id="hud">
        <div class="stat">第 <span id="day-display" style="color:var(--gold)">1</span> 天</div>
        <div class="stat">客流: <span id="guest-count">0/0</span></div>
        <div class="stat">💰 <span id="money-display">500</span></div>
        <button style="width:auto; padding:5px 10px;" onclick="toggleRecipe()">📖 SOP手册</button>
    </div>

    <div id="game-area">
        <div id="order-panel">
            </div>

        <div id="workstation">
            <div class="section-title">制作容器 (严格遵循顺序!)</div>
            <div id="mixing-glass"></div>
            
            <div class="controls-section">
                <div class="section-title">基酒 / 烈酒</div>
                <div class="btn-grid" id="spirits-grid"></div>
            </div>
            
            <div class="controls-section">
                <div class="section-title">辅料 / 装饰 / 冰</div>
                <div class="btn-grid" id="mixers-grid"></div>
            </div>

            <div class="controls-section" id="snack-section" style="display:none;">
                <div class="section-title">后厨小吃 (微操)</div>
                <div class="btn-grid" id="snacks-grid"></div>
            </div>

            <button class="action" onclick="serveOrder()">🍺 出品 / 上菜</button>
            <button class="action" style="background:#c0392b; font-size:14px; margin-top:5px; padding:10px;" onclick="clearGlass()">❌ 倒掉重做 (-$5)</button>
        </div>
    </div>

    <div id="recipe-book">
        <h3>SOP 严格执行手册</h3>
        <p style="font-size:12px; color:red;">*带箭头 -> 表示必须按顺序投放</p>
        <ul id="recipe-list" style="padding-left:20px; font-size:13px;"></ul>
        <button onclick="toggleRecipe()" style="width:100%">关闭</button>
    </div>

    <div id="summary-modal" class="modal">
        <h2 style="color:var(--gold)">今日结业</h2>
        <div id="summary-content" style="text-align:left; font-size: 18px; line-height: 1.6; border: 1px solid #7f8c8d; padding: 20px; border-radius: 5px;"></div>
        <button class="action" style="width: 200px; margin-top:20px;" onclick="startNextDay()">开始下一天</button>
    </div>

<script>
    // --- Data: Cocktails with STRICT Sequence ---
    // strict: true 意味着数组顺序必须完全一致
    const COCKTAILS = {
        'c1': { 
            name: 'Old Fashioned', 
            // 逻辑：糖 -> 苦精 -> 冰 -> 威士忌 (这是老派做法，先化糖)
            recipe: ['Sugar', 'Bitters', 'Ice', 'Bourbon'], 
            strict: true,
            price: 15 
        },
        'c2': { 
            name: 'Gin Tonic', 
            // 逻辑：冰 -> 金酒 -> 汤力水 -> 青柠 (确保气泡且青柠在顶端)
            recipe: ['Ice', 'Gin', 'Tonic', 'Lime'], 
            strict: true,
            price: 12 
        },
        'c3': { 
            name: 'Negroni', 
            // 搅拌类，顺序相对不那么敏感，但通常也是 冰 -> 烈酒
            recipe: ['Ice', 'Gin', 'Vermouth', 'Campari'], 
            strict: false, // 允许乱序，只要东西对
            price: 16 
        },
        'c4': { 
            name: 'Martini', 
            recipe: ['Ice', 'Gin', 'Vermouth', 'Olive'], 
            strict: false,
            price: 18 
        },
        'c5': { 
            name: 'Whisky Sour', 
            // 摇和法：所有材料 -> 冰
            recipe: ['Bourbon', 'Lemon', 'Sugar', 'EggWhite', 'Ice'], 
            strict: false, 
            price: 16 
        }
    };

    const SPIRITS = [
        { id: 'Bourbon', name: 'Buffalo Trace', type: 'base', tags: ['美国', '波本'], price: 10 },
        { id: 'Gin', name: 'Hendricks', type: 'base', tags: ['苏格兰', '金酒'], price: 10 },
        { id: 'Vermouth', name: 'Rosso', type: 'mixer', tags: [], price: 0 },
        { id: 'Campari', name: 'Campari', type: 'mixer', tags: [], price: 0 },
        { id: 'Macallan', name: 'Macallan 12', type: 'spirit', tags: ['斯佩赛', '雪莉桶'], price: 25 },
        { id: 'Lagavulin', name: 'Lagavulin 16', type: 'spirit', tags: ['艾雷岛', '泥煤'], price: 30 },
        { id: 'Tequila', name: 'Don Julio', type: 'spirit', tags: ['墨西哥', '龙舌兰'], price: 15 }
    ];

    const MIXERS = ['Ice', 'Sugar', 'Bitters', 'Tonic', 'Lime', 'Olive', 'Lemon', 'EggWhite', 'Water'];

    const SNACKS = [
        { id: 's1', name: '炸薯条', time: 3000, price: 8 },
        { id: 's2', name: '切黄瓜', time: 1500, price: 5 },
        { id: 's3', name: '摆火腿', time: 5000, price: 20 }
    ];

    // --- State ---
    let state = {
        day: 1,
        stage: 1,
        money: 500,
        orders: [],
        glass: [],
        isPlaying: false,
        dailyStats: { revenue: 0, cost: 0, rent: 0, tips: 0 },
        guests: { total: 0, served: 0, spawned: 0 } // 新增：客流统计
    };

    const CONFIG = {
        patience: 45, // 45秒耐心
        rentBase: 100
    };

    let timers = { spawner: null, render: null };

    // --- Core Logic ---

    function init() {
        renderControls();
        renderRecipeBook();
        startDay();
    }

    function calculateDailyGuests(day) {
        // 核心算法：线性增长 + 随机扰动
        // Day 1: 5 + 1 + rand(-2,2) = 4~8人
        // Day 10: 5 + 10 + rand(-2,2) = 13~17人
        let noise = Math.floor(Math.random() * 5) - 2; // -2 到 +2
        let count = 5 + (day * 1) + noise;
        return Math.max(3, count); // 每天至少3人
    }

    function startDay() {
        document.getElementById('summary-modal').style.display = 'none';
        state.glass = [];
        state.orders = [];
        state.dailyStats = { revenue: 0, cost: 0, rent: CONFIG.rentBase + (state.stage * 50), tips: 0 };
        state.isPlaying = true;
        
        // Setup Guests
        let todayGuests = calculateDailyGuests(state.day);
        state.guests = { total: todayGuests, served: 0, spawned: 0 };

        // Stage Logic
        if (state.day > 2) state.stage = 2; 
        if (state.day > 5) state.stage = 3;
        
        document.getElementById('snack-section').style.display = state.stage >= 3 ? 'block' : 'none';

        updateHUD();
        renderGlass();
        renderOrders();

        // Guest Spawner Logic (Quota Based)
        // 计算间隔：比如一天想让它大概在 2-3 分钟内结束，就把客人均匀分布在时间轴上
        // 这里为了测试，我们随机间隔 2-6秒来一个
        timers.spawner = setInterval(() => {
            if (state.guests.spawned < state.guests.total) {
                generateOrder();
                state.guests.spawned++;
                updateHUD();
            } else {
                // 所有人已生成，等待全部服务完毕
                clearInterval(timers.spawner);
                checkEndDay();
            }
        }, Math.random() * 4000 + 2000); // 随机生成间隔
        
        // Timer Renderer
        timers.render = setInterval(() => {
            renderOrders();
            checkEndDay();
        }, 100);
    }

    function checkEndDay() {
        // 如果所有人已生成，且订单列表为空（都处理完了），结束
        if (state.guests.spawned >= state.guests.total && state.orders.length === 0) {
            endDay();
        }
    }

    function generateOrder() {
        if (!state.isPlaying) return;
        
        let type = 'cocktail';
        if (state.stage >= 2 && Math.random() > 0.7) type = 'spirit';
        if (state.stage >= 3 && Math.random() > 0.8) type = 'snack';

        let order = {
            id: Date.now() + Math.random(),
            type: type,
            timeLeft: CONFIG.patience,
            maxTime: CONFIG.patience,
            item: null,
            reqText: ""
        };

        if (type === 'cocktail') {
            const keys = Object.keys(COCKTAILS);
            order.item = COCKTAILS[keys[Math.floor(Math.random() * keys.length)]];
            order.reqText = order.item.name;
        } else if (type === 'spirit') {
            const spirits = SPIRITS.filter(s => s.type === 'spirit');
            const target = spirits[Math.floor(Math.random() * spirits.length)];
            order.item = target;
            order.reqText = (Math.random() > 0.5) ? `${target.tags[0]}的酒` : target.name;
        } else {
            const snack = SNACKS[Math.floor(Math.random() * SNACKS.length)];
            order.item = snack;
            order.reqText = snack.name;
        }

        state.orders.push(order);
    }

    function endDay() {
        clearInterval(timers.spawner);
        clearInterval(timers.render);
        state.isPlaying = false;
        
        let profit = state.dailyStats.revenue + state.dailyStats.tips - state.dailyStats.cost - state.dailyStats.rent;
        state.money += profit;

        const modal = document.getElementById('summary-modal');
        const content = document.getElementById('summary-content');
        
        let html = `
            <strong>第 ${state.day} 天结业</strong><br>
            接待客人: ${state.guests.total} 位<br>
            营业额: +$${state.dailyStats.revenue}<br>
            损耗: <span style="color:#e74c3c">-$${state.dailyStats.cost}</span><br>
            房租: <span style="color:#e74c3c">-$${state.dailyStats.rent}</span><br>
            ------------------<br>
            <strong>净利润: ${profit >= 0 ? '+' : ''}$${profit}</strong><br>
            <strong>总资产: $${state.money}</strong>
        `;

        if (state.money < 0) {
            html += `<br><br><h1 style="color:#e74c3c">破产倒闭</h1>`;
            document.querySelector('#summary-modal button').innerText = "刷新重来";
            document.querySelector('#summary-modal button').onclick = () => location.reload();
        } else {
            document.querySelector('#summary-modal button').innerText = "开始下一天";
            document.querySelector('#summary-modal button').onclick = startNextDay;
        }

        content.innerHTML = html;
        modal.style.display = 'flex';
    }

    function startNextDay() {
        state.day++;
        startDay();
    }

    // --- Action Functions ---

    function addToGlass(id) {
        state.glass.push(id);
        renderGlass();
    }

    function clearGlass() {
        if(state.glass.length > 0) {
            state.dailyStats.cost += 5;
            state.glass = [];
            renderGlass();
        }
    }

    function startSnack(snack, btn) {
        if (btn.disabled) return;
        const orderIdx = state.orders.findIndex(o => o.type === 'snack' && o.item.name === snack.name);
        
        if (orderIdx === -1) {
            alert("没人点这个 (浪费食材 -$5)");
            state.dailyStats.cost += 5;
            updateHUD();
            return;
        }

        btn.disabled = true;
        btn.style.opacity = 0.5;
        let bar = document.createElement('div');
        bar.className = 'snack-progress';
        btn.appendChild(bar);

        let progress = 0;
        let step = 100 / (snack.time / 50);
        let t = setInterval(() => {
            progress += step;
            bar.style.width = progress + '%';
            if (progress >= 100) {
                clearInterval(t);
                fulfillOrder(orderIdx, true);
                btn.disabled = false;
                btn.style.opacity = 1;
                bar.remove();
            }
        }, 50);
    }

    function serveOrder() {
        // --- 核心改动：顺序检测逻辑 ---
        let matchIndex = -1;

        for (let i = 0; i < state.orders.length; i++) {
            let o = state.orders[i];
            
            // 1. 鸡尾酒检查
            if (o.type === 'cocktail') {
                let isMatch = false;
                if (o.item.strict) {
                    // 严格模式：直接转字符串比较 "Ice,Gin,Tonic" === "Ice,Gin,Tonic"
                    isMatch = (state.glass.join(',') === o.item.recipe.join(','));
                } else {
                    // 宽松模式：排序后比较
                    isMatch = ([...state.glass].sort().toString() === [...o.item.recipe].sort().toString());
                }
                
                if (isMatch) {
                    matchIndex = i; break;
                }
            } 
            // 2. 烈酒检查 (简化版，只需包含)
            else if (o.type === 'spirit') {
                if (state.glass.length === 1 && state.glass[0] === o.item.id) {
                    matchIndex = i; break;
                }
            }
        }

        if (matchIndex !== -1) {
            fulfillOrder(matchIndex, true);
            state.glass = [];
            renderGlass();
        } else {
            // 错误反馈
            state.dailyStats.cost += 10;
            // 简单判断是不是顺序错了
            let isOrderError = false;
            // 遍历所有订单，看看有没有配方对但顺序错的
            state.orders.forEach(o => {
                if (o.type === 'cocktail' && o.item.strict) {
                    if ([...state.glass].sort().toString() === [...o.item.recipe].sort().toString()) {
                        isOrderError = true;
                    }
                }
            });

            if (isOrderError) {
                alert("❌ SOP顺序错误！(严格模式生效中)");
            } else {
                alert("❌ 配方错误或没人点这个！");
            }
            
            state.glass = [];
            renderGlass();
            updateHUD();
        }
    }

    function fulfillOrder(index, success) {
        let order = state.orders[index];
        let tip = Math.floor(order.timeLeft / 5); 
        state.dailyStats.revenue += order.item.price;
        state.dailyStats.tips += tip;
        state.orders.splice(index, 1);
        updateHUD();
    }

    // --- Rendering ---

    function renderOrders() {
        const panel = document.getElementById('order-panel');
        // 只在列表变动时重绘DOM
        if (panel.childElementCount !== state.orders.length) {
            panel.innerHTML = '';
            state.orders.forEach(o => {
                const div = document.createElement('div');
                div.className = 'order-card';
                div.id = `order-${o.id}`;
                let strictBadge = (o.type === 'cocktail' && o.item.strict) ? '<span style="color:red; font-size:10px; border:1px solid red; padding:1px;">严格SOP</span>' : '';
                div.innerHTML = `
                    <div style="font-weight:bold">${o.reqText} ${strictBadge}</div>
                    <div style="font-size:12px; color:#555">剩余: <span class="txt-time">${Math.floor(o.timeLeft)}</span>s</div>
                    <div class="order-timer" style="width:100%"></div>
                `;
                panel.appendChild(div);
            });
        }

        // 刷新进度条
        state.orders.forEach(o => {
            if(state.isPlaying) {
                o.timeLeft -= 0.1;
                const el = document.getElementById(`order-${o.id}`);
                if (el) {
                    el.querySelector('.order-timer').style.width = (o.timeLeft / o.maxTime * 100) + '%';
                    el.querySelector('.txt-time').innerText = Math.floor(o.timeLeft);
                    if (o.timeLeft < 10) el.querySelector('.order-timer').style.background = '#e74c3c';
                }
                
                if (o.timeLeft <= 0) {
                    state.dailyStats.cost += 5; // 超时
                    state.orders = state.orders.filter(x => x.id !== o.id);
                    panel.innerHTML = ''; // 强制重绘
                }
            }
        });
    }

    function renderGlass() {
        document.getElementById('mixing-glass').innerHTML = state.glass.map(i => `<span class="ingredient-tag">${i}</span>`).join('');
    }

    function updateHUD() {
        document.getElementById('day-display').innerText = state.day;
        document.getElementById('guest-count').innerText = `${state.guests.spawned}/${state.guests.total}`; // 显示进度
        document.getElementById('money-display').innerText = state.money + state.dailyStats.revenue + state.dailyStats.tips - state.dailyStats.cost - state.dailyStats.rent;
    }

    function renderControls() {
        // ... (Same as before)
        const sGrid = document.getElementById('spirits-grid');
        const mGrid = document.getElementById('mixers-grid');
        const snGrid = document.getElementById('snacks-grid');
        
        SPIRITS.forEach(s => {
            const btn = document.createElement('button');
            btn.className = s.type === 'spirit' ? 'spirit' : 'mixer';
            btn.innerText = s.name;
            btn.onclick = () => addToGlass(s.id);
            sGrid.appendChild(btn);
        });
        MIXERS.forEach(m => {
            const btn = document.createElement('button');
            btn.className = 'garnish';
            btn.innerText = m;
            btn.onclick = () => addToGlass(m);
            mGrid.appendChild(btn);
        });
        SNACKS.forEach(s => {
            const btn = document.createElement('button');
            btn.className = 'snack';
            btn.innerText = s.name;
            btn.onclick = (e) => startSnack(s, e.target);
            snGrid.appendChild(btn);
        });
    }

    function renderRecipeBook() {
        const list = document.getElementById('recipe-list');
        list.innerHTML = '';
        Object.values(COCKTAILS).forEach(c => {
            let arrow = c.strict ? " <span style='color:red'>-></span> " : " + ";
            list.innerHTML += `<li><b>${c.name}</b>: ${c.recipe.join(arrow)}</li>`;
        });
        list.innerHTML += `<hr><li>... (烈酒产区提示同上)</li>`;
    }

    function toggleRecipe() {
        const book = document.getElementById('recipe-book');
        book.style.display = book.style.display === 'none' ? 'block' : 'none';
    }

    init();
</script>
</body>
</html>
